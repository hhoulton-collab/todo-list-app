<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=notes-app/" />
  <title>PM Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 16px;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      width: 100%;
      max-width: 860px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e8eaed;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    input[type="text"]:focus { border-color: #6c63ff; }
    input[type="text"]::placeholder { color: #aaa; }

    .btn-add {
      padding: 12px 22px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #574fd6; }
    .btn-add:active { transform: scale(0.97); }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 860px;
      align-items: start;
    }

    .column {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 28px 24px;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .column-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 20px;
      padding: 2px 9px;
      line-height: 1.6;
    }

    .badge-todo { background: #ede9ff; color: #6c63ff; }
    .badge-done { background: #e6faf0; color: #27ae60; }

    /* Day group */
    .day-group { margin-bottom: 20px; }
    .day-group:last-child { margin-bottom: 0; }

    .day-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #27ae60;
      background: #e6faf0;
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 6px;
    }

    .task-list { list-style: none; }

    .task-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid #f0f2f5;
      animation: slideIn 0.2s ease;
    }

    .task-list li:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      min-width: 20px;
      border: 2px solid #d0d3da;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-top: 1px;
    }

    .task-checkbox:hover { border-color: #6c63ff; }

    .task-checkbox:checked {
      background: #27ae60;
      border-color: #27ae60;
    }

    .task-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 0.93rem;
      color: #333;
      line-height: 1.4;
      word-break: break-word;
      display: block;
    }

    .done-col .task-text {
      text-decoration: line-through;
      color: #b0b5c0;
    }

    .task-time {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 3px;
      display: block;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.2s, background 0.2s;
    }

    .btn-delete:hover { color: #e74c3c; background: #fff0f0; }

    .empty {
      text-align: center;
      color: #ccc;
      font-size: 0.88rem;
      padding: 28px 0;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    .filter-row input[type="date"] {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #e8eaed;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #1a1a2e;
      outline: none;
      background: #f8f9fb;
      transition: border-color 0.2s;
    }

    .filter-row input[type="date"]:focus { border-color: #27ae60; }

    .btn-clear-filter {
      background: none;
      border: 2px solid #e8eaed;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.8rem;
      color: #aaa;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-clear-filter:hover { border-color: #27ae60; color: #27ae60; }

    .filter-active .day-group { display: none; }
    .filter-active .day-group.visible { display: block; }

    .no-filter-results {
      text-align: center;
      color: #ccc;
      font-size: 0.88rem;
      padding: 20px 0;
      display: none;
    }

    @media (max-width: 580px) {
      .columns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>My To-Do List</h1>

  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Add a new task…" maxlength="200">
    <button class="btn-add" id="addBtn">Add</button>
  </div>

  <div class="columns">
    <div class="column">
      <div class="column-header">
        <h2>To Do</h2>
        <span class="badge badge-todo" id="todoBadge">0</span>
      </div>
      <ul class="task-list" id="todoList"></ul>
      <p class="empty" id="todoEmpty">No tasks yet!</p>
    </div>

    <div class="column done-col">
      <div class="column-header">
        <h2>Completed</h2>
        <span class="badge badge-done" id="doneBadge">0</span>
      </div>
      <div class="filter-row">
        <input type="date" id="dateFilter" title="Filter by day">
        <button class="btn-clear-filter" id="clearFilter">Clear</button>
      </div>
      <div id="doneGroups"></div>
      <p class="empty" id="doneEmpty">Nothing completed yet.</p>
      <p class="no-filter-results" id="noFilterResults">No tasks completed on this day.</p>
    </div>
  </div>

  <script>
    const input           = document.getElementById('taskInput');
    const addBtn          = document.getElementById('addBtn');
    const todoList        = document.getElementById('todoList');
    const doneGroups      = document.getElementById('doneGroups');
    const todoEmpty       = document.getElementById('todoEmpty');
    const doneEmpty       = document.getElementById('doneEmpty');
    const todoBadge       = document.getElementById('todoBadge');
    const doneBadge       = document.getElementById('doneBadge');
    const dateFilter      = document.getElementById('dateFilter');
    const clearFilter     = document.getElementById('clearFilter');
    const noFilterResults = document.getElementById('noFilterResults');

    // completed tasks stored as { text, date } objects
    let completed = [];

    function dayKey(date) {
      return date.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function friendlyDay(date) {
      const today = new Date();
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      if (dayKey(date) === dayKey(today)) return 'Today';
      if (dayKey(date) === dayKey(yesterday)) return 'Yesterday';
      return date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatTime(date) {
      return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function applyFilter() {
      const val = dateFilter.value; // 'YYYY-MM-DD' or ''
      const groups = doneGroups.querySelectorAll('.day-group');
      if (!val) {
        doneGroups.classList.remove('filter-active');
        groups.forEach(g => g.classList.remove('visible'));
        noFilterResults.style.display = 'none';
        return;
      }
      doneGroups.classList.add('filter-active');
      let anyVisible = false;
      groups.forEach(g => {
        const matches = g.dataset.dateKey === val;
        g.classList.toggle('visible', matches);
        if (matches) anyVisible = true;
      });
      noFilterResults.style.display = anyVisible ? 'none' : 'block';
    }

    function updateUI() {
      const tc = todoList.children.length;
      todoEmpty.style.display = tc === 0 ? 'block' : 'none';
      todoBadge.textContent = tc;
      doneBadge.textContent = completed.length;
      doneEmpty.style.display = completed.length === 0 ? 'block' : 'none';
      if (completed.length > 0) noFilterResults.style.display = 'none';
    }

    function rebuildDoneColumn() {
      doneGroups.innerHTML = '';

      // group by day
      const groups = {};
      const order  = [];
      completed.forEach(item => {
        const key = dayKey(item.date);
        if (!groups[key]) { groups[key] = []; order.push(key); }
        groups[key].push(item);
      });

      order.forEach(key => {
        const groupEl = document.createElement('div');
        groupEl.className = 'day-group';
        // store ISO date (YYYY-MM-DD) for filter matching
        const d = groups[key][0].date;
        groupEl.dataset.dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        const label = document.createElement('span');
        label.className = 'day-label';
        label.textContent = friendlyDay(groups[key][0].date);
        groupEl.appendChild(label);

        const ul = document.createElement('ul');
        ul.className = 'task-list';

        groups[key].forEach(item => {
          const li  = document.createElement('li');
          li.style.animation = 'none';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'task-checkbox';
          checkbox.checked = true;
          checkbox.addEventListener('change', () => {
            completed = completed.filter(c => c !== item);
            rebuildDoneColumn();
            todoList.appendChild(makeTodoItem(item.text));
            updateUI();
          });

          const body = document.createElement('div');
          body.className = 'task-body';

          const span = document.createElement('span');
          span.className = 'task-text';
          span.textContent = item.text;

          const time = document.createElement('span');
          time.className = 'task-time';
          time.textContent = 'Completed at ' + formatTime(item.date);

          body.appendChild(span);
          body.appendChild(time);

          const del = document.createElement('button');
          del.className = 'btn-delete';
          del.innerHTML = '&#x2715;';
          del.title = 'Delete task';
          del.addEventListener('click', () => {
            completed = completed.filter(c => c !== item);
            rebuildDoneColumn();
            updateUI();
          });

          li.appendChild(checkbox);
          li.appendChild(body);
          li.appendChild(del);
          ul.appendChild(li);
        });

        groupEl.appendChild(ul);
        doneGroups.appendChild(groupEl);
      });

      updateUI();
    }

    function makeTodoItem(text) {
      const li = document.createElement('li');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'task-checkbox';

      const body = document.createElement('div');
      body.className = 'task-body';

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = text;

      body.appendChild(span);

      const del = document.createElement('button');
      del.className = 'btn-delete';
      del.innerHTML = '&#x2715;';
      del.title = 'Delete task';
      del.addEventListener('click', () => { li.remove(); updateUI(); });

      checkbox.addEventListener('change', () => {
        li.remove();
        completed.push({ text, date: new Date() });
        rebuildDoneColumn();
        updateUI();
      });

      li.appendChild(checkbox);
      li.appendChild(body);
      li.appendChild(del);
      return li;
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      todoList.appendChild(makeTodoItem(text));
      input.value = '';
      updateUI();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    dateFilter.addEventListener('change', applyFilter);
    clearFilter.addEventListener('click', () => { dateFilter.value = ''; applyFilter(); });

    updateUI();
  </script>
</body>
</html>
